<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A* Traffic Route Planner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <aside class="control-panel" aria-label="Route controls">
      <div class="topbar">
        <div>
          <h1>A* Traffic Route Planner</h1>
          <p id="routeSummary">Click a road for start, then click a road for destination.</p>
        </div>
        <div class="toolbar" aria-label="Map actions">
          <label class="traffic-control" for="trafficSelect">
            <span>Traffic</span>
            <select id="trafficSelect">
              <option value="normal">Normal</option>
              <option value="light">Light</option>
              <option value="heavy">Heavy</option>
              <option value="rush">Rush hour</option>
            </select>
          </label>
          <button id="clearPinsBtn" type="button" class="secondary">Remove Pins</button>
          <button id="startRouteBtn" type="button" disabled>Start</button>
        </div>
      </div>
      <div class="legend" aria-label="Map legend">
        <strong>Legend</strong>
        <p><i class="line possible"></i>Possible routes</p>
        <p><i class="line best"></i>A* efficient route</p>
        <p><i class="line low"></i>Low traffic</p>
        <p><i class="line medium"></i>Medium traffic</p>
        <p><i class="line high"></i>Heavy traffic</p>
      </div>
      <div class="map-hint" id="mapHint">Click a road to set the start point.</div>
    </aside>
    <section class="map-panel" aria-label="Interactive city map">
      <canvas id="mapCanvas" width="1800" height="1100"></canvas>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
